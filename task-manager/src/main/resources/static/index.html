<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro 🌿</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #2d6a4f; --success: #52b788; --danger: #e63946; }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 40px;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-attachment: fixed;
        }

        .container { max-width: 1300px; margin: auto; }

        /* Add Task Card */
        .main-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }

        .input-row { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, select, textarea { padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-size: 14px; }

        .btn-add {
            background: var(--primary); color: white; border: none; padding: 12px 35px;
            border-radius: 25px; font-weight: bold; cursor: pointer; float: right;
            transition: 0.3s;
        }

        /* 3-Column Layout */
        .grid-layout { display: flex; gap: 30px; align-items: flex-start; }

        .sidebar-left { flex: 0 0 220px; }
        .content-center { flex: 1; }
        .sidebar-right { flex: 0 0 320px; }

        /* Glassmorphism Cards */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Task Cards */
        .task-card {
            background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 8px solid var(--primary);
            transition: 0.2s ease;
        }
        .priority-HIGH { border-left-color: var(--danger); }
        .priority-MEDIUM { border-left-color: #f39c12; }
        .priority-LOW { border-left-color: #3498db; }

        /* Sidebar Buttons */
        .btn-side {
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.2);
            color: white; font-weight: 600; cursor: pointer; text-align: left;
        }
        .btn-side.active { background: var(--primary); }
        .btn-clear { background: var(--danger); color: white; border: none; width: 100%; padding: 10px; border-radius: 10px; cursor: pointer; }

        /* Calendar Fix */
        #inlineCalendar { width: 100% !important; }
        .flatpickr-calendar { box-shadow: none !important; width: 100% !important; background: transparent !important; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: white; font-size: 2.5rem; margin-bottom: 30px;">Task Manager 🌿</h1>

    <div class="main-card">
        <div class="input-row">
            <select id="timeInput"></select>
            <input type="text" id="titleInput" placeholder="What's the main focus?">
            <select id="categoryInput">
                <option value="GENERAL">Category</option>
                <option value="DEEP WORK">DEEP WORK</option>
                <option value="SPORT">SPORT</option>
                <option value="SQL PRACTICE">SQL PRACTICE</option>
                <option value="DOCUMENTATION">DOCUMENTATION</option>
            </select>
            <select id="priorityInput">
                <option value="LOW">Low Priority</option>
                <option value="MEDIUM">Medium Priority</option>
                <option value="HIGH">High Priority</option>
            </select>
            <input type="date" id="dateInput">
        </div>
        <textarea id="descInput" placeholder="Detailed notes (steps, links, sub-tasks)..." style="width: 100%; height: 70px; box-sizing: border-box;"></textarea>
        <button class="btn-add" onclick="createTask()">+ ADD TASK</button>
        <div style="clear: both;"></div>
    </div>

    <div class="grid-layout">
        <div class="sidebar-left">
            <div class="card" style="background: white;">
                <p style="margin:0; font-weight:bold;">Progress: <span id="percText">0%</span></p>
                <div style="background:#eee; height:8px; border-radius:4px; margin:10px 0; overflow:hidden;">
                    <div id="progBar" style="background:var(--success); width:0%; height:100%; transition:0.5s;"></div>
                </div>
                <small id="countText" style="color:#666;">0/0 Tasks left</small>
            </div>

            <button class="btn-side active" onclick="filterTasks('all', this)">All Tasks</button>
            <button class="btn-side" onclick="filterTasks('active', this)">To Do</button>
            <button class="btn-side" onclick="filterTasks('completed', this)">Finished</button>
            <button class="btn-clear" onclick="clearCompleted()">🗑️ CLEAR FINISHED</button>

            <div class="card" style="margin-top:20px;">
                <h4 style="margin-top:0">Time Distribution</h4>
                <div id="categoryStatsList"></div>
            </div>
        </div>

        <div class="content-center">
            <input type="text" id="searchInput" oninput="searchTasks()" placeholder="🔍 Search tasks..." style="width:100%; border:none; padding:15px; border-radius:15px; margin-bottom:20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <div id="taskList"></div>
        </div>

        <div class="sidebar-right">
            <div class="card" style="background: white; text-align:center;">
                <h4 style="margin-top:0; color:var(--primary);">📅 SELECT DATE</h4>
                <div id="inlineCalendar"></div>
                <button onclick="resetToAll()" class="btn-add" style="float:none; width:100%; margin-top:15px; border-radius:10px;">Reset to All</button>
                <button id="openReportBtn" class="btn-add" style="float:none; width:100%; margin-top:10px; border-radius:10px; background:#2ecc71;">📊 Productivity Report</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    const sel = document.getElementById('timeInput');
    for(let i=8; i<21; i++){
        let h = i < 10 ? '0'+i+':00' : i+':00';
        let hN = (i+1) < 10 ? '0'+(i+1)+':00' : (i+1)+':00';
        sel.innerHTML += `<option value="${h} - ${hN}">${h} - ${hN}</option>`;
    }
</script>
</body>
</html>
