<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Productivity Analytics 📊</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; padding: 40px; text-align: center; }
        .chart-container { width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #2d6a4f; margin-bottom: 30px; }
        .stats-summary { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .stat-card { background: #e8f5e9; padding: 15px 25px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
<h1>Work Focus Report 🥧</h1>
<div class="chart-container">
    <canvas id="productivityChart"></canvas>
</div>
<div class="stats-summary" id="summary"></div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const resp = await fetch('/api/tasks');
        const tasks = await resp.json();

        const done = tasks.filter(t => t.completed).length;
        const pending = tasks.length - done;

        // Inițializăm Graficul
        new Chart(document.getElementById('productivityChart'), {
            type: 'doughnut', // Arată mai modern decât pie-ul clasic
            data: {
                labels: ['Finished', 'Pending'],
                datasets: [{
                    data: [done, pending],
                    backgroundColor: ['#52b788', '#ff7675'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });

        document.getElementById('summary').innerHTML = `
            <div class="stat-card">✅ Completed: ${done}</div>
            <div class="stat-card" style="background: #ffebee;">⏳ Remaining: ${pending}</div>
        `;
    });
</script>
</body>
</html>
